<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Temkaa bnn movies</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b0b0b;
    color:white;
}


/* Header */

header{
    background:linear-gradient(90deg,#e50914,#8b0000);
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}


.search{
    padding:10px;
    border-radius:20px;
    border:none;
}


/* Hero */

.hero{
    height:450px;
    background:
    linear-gradient(#0006,#000),
    url("model.jpg") center/cover;

    display:flex;
    align-items:end;
    padding:40px;
}


.hero h1{
    font-size:50px;
}


/* Movies */

.movies{
    padding:30px;
}


.card{
    background:#1c1c1c;
    width:260px;
    display:inline-block;
    margin:15px;
    padding:15px;
    border-radius:20px;
    transition:.3s;
}


.card:hover{
    transform:scale(1.05);
}


.card img{
    width:100%;
    height:320px;
    object-fit:cover;
    border-radius:15px;
}


button{
    width:100%;
    padding:12px;
    background:#e50914;
    color:white;
    border:0;
    border-radius:20px;
    cursor:pointer;
}


/* Popup */

.guide{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    width:350px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 30px black;
}


.guide img{
    width:100%;
    border-radius:15px;
}


.close{
    background:#555;
    margin-top:10px;
}

</style>

</head>


<body>


<header>

<div class="logo">
🎬 Temkaa bnn movies
</div>


<input class="search" placeholder="Кино хайх...">

</header>



<section class="hero">

<h1>№1 Модель цагдаа</h1>

</section>



<section class="movies">

<h2>🔥 Шилдэг кинонууд</h2>


<div class="card">

<img src="movie1.jpg">

<h2>№1 Модель цагдаа</h2>

<p>Action • 2026</p>

<button onclick="openGuide()">
Захиалах
</button>

</div>



<div class="card">

<img src="movie2.jpg">

<h2>Шинэ кино</h2>

<p>Drama • HD</p>

<button onclick="openGuide()">
Захиалах
</button>

</div>



</section>



<div class="guide" id="guide">

<h2>🎥 Кино захиалах заавар</h2>

<img src="guide.jpg">


<button class="close" onclick="closeGuide()">
Хаах
</button>

</div>



<script>

function openGuide(){
document.getElementById("guide").style.display="block";
}


function closeGuide(){
document.getElementById("guide").style.display="none";
}

</script>


</body>
</html>
